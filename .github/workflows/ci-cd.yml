name: CI/CD Pipeline - saludo-service

# Trigger: push a main y pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: saludo-service

jobs:

  # JOB 1: Snyk Security Scan (IE3)
  # Primer job — si falla, bloquea todo el pipeline
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Run Snyk test (falla si hay vulnerabilidades HIGH)
        run: snyk test --severity-threshold=high

      - name: Generate Snyk JSON Report
        if: always()
        run: snyk test --json > snyk-report.json || echo "Reporte generado"

      - name: Upload Snyk Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json

  # JOB 2: Tests unitarios + JaCoCo
  # Depende de snyk-scan — si Snyk falla, este no corre
  test:
    name: Tests + Cobertura JaCoCo
    runs-on: ubuntu-latest
    needs: snyk-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run tests and generate JaCoCo report
        run: ./mvnw clean verify -B

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/


  # JOB 3: SonarCloud Analysis
  # Depende de test — si los tests fallan, no analiza
  sonar-analysis:
    name: 📊 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita eso

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Download JaCoCo report
        uses: actions/download-artifact@v8
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw verify sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}


  # JOB 4: Build imagen Docker
  # Depende de sonar-analysis
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: sonar-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Verify image was built
        run: docker images | grep ${{ env.IMAGE_NAME }}

  # JOB 5: Deploy con Docker Compose
  # Solo corre en push a main (no en PRs)
  deploy:
    name: Deploy Docker Compose
    runs-on: ubuntu-latest
    needs: [ build, sonar-analysis ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -B

      - name: Deploy with Docker Compose
        run: docker compose up -d --build

      - name: Health check (espera hasta 2 minutos)
        run: |
          echo "Esperando que la app arranque..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App levantada correctamente"
              exit 0
            fi
            echo "Intento $i/12 - esperando 10s..."
            sleep 10
          done
          echo "Health check falló después de 2 minutos"
          exit 1

      - name: Smoke test
        run: |
          curl -sf http://localhost:8080/ | grep "Hola Mundo"
          curl -sf http://localhost:8080/saludo?nombre=DevOps | grep "Hola, DevOps"
          curl -sf http://localhost:8080/info | grep "saludo-service"
          echo "Smoke tests pasaron"

      - name: Upload deploy logs
        if: always()
        run: docker compose logs > deploy-logs.txt 2>&1

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: deploy-logs.txt

      - name: Cleanup
        if: always()
        run: docker compose down -v
